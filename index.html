```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Energy Management - Scenario Tree</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%);
min-height:100vh;
padding:30px;
color:#1e293b;
}

header{
background:white;
border-radius:16px;
padding:30px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

header h1{
font-size:2rem;
font-weight:800;
}

.graph-wrapper{
background:white;
border-radius:16px;
box-shadow:0 25px 70px rgba(0,0,0,.25);
overflow:hidden;
}

.graph-header{
background:#1e293b;
color:white;
padding:18px 25px;
font-weight:700;
}

.graph-canvas{
padding:40px;
overflow:auto;
}

svg{
width:100%;
height:900px;
}

.tree-link{
fill:none;
stroke:#cbd5e1;
stroke-width:3;
}

.tree-node circle{
stroke:white;
stroke-width:3;
filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
cursor:pointer;
}

.tree-node text{
fill:white;
font-weight:700;
text-anchor:middle;
pointer-events:none;
}

.tooltip{
position:fixed;
background:white;
border:3px solid #3b82f6;
border-radius:10px;
padding:12px 16px;
font-size:13px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
display:none;
z-index:999;
}

.tooltip.visible{
display:block;
}

.tooltip-row{
display:flex;
gap:6px;
margin-bottom:4px;
}

.tooltip-key{
font-weight:700;
color:#3b82f6;
}

.tooltip-label{
font-weight:800;
margin-bottom:6px;
}
</style>
</head>

<body>

<header>
<h1>🌳 Experimental Scenarios Hierarchy</h1>
<p>36 RL test scenarios • Hover for details</p>
</header>

<div class="graph-wrapper">

<div class="graph-header">
Scenario Tree Structure
</div>

<div class="graph-canvas">
<svg id="treeSvg"></svg>
<div class="tooltip" id="tooltip"></div>
</div>

</div>

<script>

const svg=d3.select("#treeSvg");
const width=document.querySelector(".graph-canvas").offsetWidth;
const height=850;

svg.attr("viewBox",[0,0,width,height]);

const tooltip=document.getElementById("tooltip");

/* ---------- BUILD TREE DATA ---------- */

const trainingSeason=['winter','summer'];
const pvSizes=['3','5','15'];
const batteries=['5','15','20'];

const scenarioMap={
winter:{
'3':{'5':['y','b1'],'15':['z','c1'],'20':['a1','d1']},
'5':{'5':['m','p'],'15':['n','q'],'20':['o','r']},
'15':{'5':['k1','n1'],'15':['l1','o1'],'20':['m1','p1']}
},
summer:{
'3':{'5':['e1','h1'],'15':['f1','i1'],'20':['g1','j1']},
'5':{'5':['s','v'],'15':['t','w'],'20':['u','x']},
'15':{'5':['q1','t1'],'15':['r1','u1'],'20':['s1','v1']}
}
};

const root={
name:'RL Agent',
type:'root',
color:'#3b82f6',
radius:40,
details:{training:'Central Hub',pv:'-',battery:'-',test:'Training'},
children:[]
};

trainingSeason.forEach(season=>{

const seasonNode={
name:season==='winter'?'Winter':'Summer',
type:'training',
color:'#8b5cf6',
radius:30,
details:{training:season,pv:'-',battery:'-',test:'Training'},
children:[]
};

pvSizes.forEach(pv=>{

const pvNode={
name:`${pv}kWp`,
type:'pv',
color:'#0ea5e9',
radius:26,
details:{training:season,pv:`${pv}kWp`,battery:'-',test:'PV'},
children:[]
};

batteries.forEach(b=>{

const batNode={
name:`${b}kWh`,
type:'battery',
color:'#10b981',
radius:22,
details:{training:season,pv:`${pv}kWp`,battery:`${b}kWh`,test:'Battery'},
children:[]
};

const [winterTest,summerTest]=scenarioMap[season][pv][b];

batNode.children.push({
name:winterTest,
type:'scenario',
color:'#06b6d4',
radius:18,
details:{training:season,pv:`${pv}kWp`,battery:`${b}kWh`,test:'Winter Test'}
});

batNode.children.push({
name:summerTest,
type:'scenario',
color:'#f59e0b',
radius:18,
details:{training:season,pv:`${pv}kWp`,battery:`${b}kWh`,test:'Summer Test'}
});

pvNode.children.push(batNode);

});

seasonNode.children.push(pvNode);

});

root.children.push(seasonNode);

});

/* ---------- D3 TREE LAYOUT ---------- */

const hierarchy=d3.hierarchy(root);

const treeLayout=d3.tree()
.size([width,height-150])
.separation(()=>1.5);

treeLayout(hierarchy);

/* ---------- DRAW LINKS ---------- */

svg.append("g")
.selectAll("path")
.data(hierarchy.links())
.enter()
.append("path")
.attr("class","tree-link")
.attr("d",d3.linkVertical()
.x(d=>d.x)
.y(d=>d.y));

/* ---------- DRAW NODES ---------- */

const node=svg.append("g")
.selectAll("g")
.data(hierarchy.descendants())
.enter()
.append("g")
.attr("class","tree-node")
.attr("transform",d=>`translate(${d.x},${d.y})`);

node.append("circle")
.attr("r",d=>d.data.radius)
.attr("fill",d=>d.data.color);

node.append("text")
.attr("dy",".35em")
.text(d=>d.data.name);

/* ---------- TOOLTIP ---------- */

node.on("mouseover",(event,d)=>{

tooltip.classList.add("visible");

tooltip.innerHTML=`
<div class="tooltip-label">${d.data.name}</div>
<div class="tooltip-row"><div class="tooltip-key">Training:</div><div>${d.data.details.training}</div></div>
<div class="tooltip-row"><div class="tooltip-key">PV:</div><div>${d.data.details.pv}</div></div>
<div class="tooltip-row"><div class="tooltip-key">Battery:</div><div>${d.data.details.battery}</div></div>
<div class="tooltip-row"><div class="tooltip-key">Test:</div><div>${d.data.details.test}</div></div>
`;

tooltip.style.left=(event.pageX+15)+'px';
tooltip.style.top=(event.pageY-20)+'px';

});

node.on("mouseout",()=>{
tooltip.classList.remove("visible");
});

</script>

</body>
</html>
```
