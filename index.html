```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Experimental Scenario Tree</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:#1e293b;
padding:30px;
}

header{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

.wrapper{
display:grid;
grid-template-columns:250px 1fr;
gap:20px;
}

.legend{
background:white;
padding:20px;
border-radius:12px;
height:fit-content;
}

.legend h3{
margin-bottom:12px;
}

.legend-item{
display:flex;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.legend-circle{
width:20px;
height:20px;
border-radius:50%;
}

.canvas{
background:white;
border-radius:12px;
padding:10px;
overflow:hidden;
}

svg{
width:100%;
height:900px;
cursor:move;
}

.link{
fill:none;
stroke:#cbd5e1;
stroke-width:2;
}

.node circle{
stroke:white;
stroke-width:2;
cursor:pointer;
}

.node text{
font-size:12px;
fill:white;
text-anchor:middle;
pointer-events:none;
}

.tooltip{
position:fixed;
background:white;
border:2px solid #3b82f6;
padding:10px;
border-radius:8px;
font-size:13px;
display:none;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

</style>
</head>

<body>

<header>
<h1>🌳 RL Experimental Scenarios</h1>
<p>Click nodes to collapse / expand • Drag to move • Scroll to zoom</p>
</header>

<div class="wrapper">

<div class="legend">

<h3>Legend</h3>

<div class="legend-item">
<div class="legend-circle" style="background:#3b82f6"></div>
Root (RL Agent)
</div>

<div class="legend-item">
<div class="legend-circle" style="background:#8b5cf6"></div>
Training Season
</div>

<div class="legend-item">
<div class="legend-circle" style="background:#0ea5e9"></div>
PV Size
</div>

<div class="legend-item">
<div class="legend-circle" style="background:#10b981"></div>
Battery
</div>

<div class="legend-item">
<div class="legend-circle" style="background:#06b6d4"></div>
Winter Test
</div>

<div class="legend-item">
<div class="legend-circle" style="background:#f59e0b"></div>
Summer Test
</div>

</div>

<div class="canvas">
<svg id="tree"></svg>
</div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>

const width=1200;
const height=850;

const svg=d3.select("#tree")
.attr("viewBox",[0,0,width,height]);

const zoomLayer=svg.append("g");

svg.call(
d3.zoom()
.scaleExtent([0.4,2])
.on("zoom",(event)=>{
zoomLayer.attr("transform",event.transform)
})
);

const tooltip=document.getElementById("tooltip");

/* DATA */

const trainingSeason=['winter','summer'];
const pvSizes=['3','5','15'];
const batteries=['5','15','20'];

const scenarioMap={
winter:{
'3':{'5':['y','b1'],'15':['z','c1'],'20':['a1','d1']},
'5':{'5':['m','p'],'15':['n','q'],'20':['o','r']},
'15':{'5':['k1','n1'],'15':['l1','o1'],'20':['m1','p1']}
},
summer:{
'3':{'5':['e1','h1'],'15':['f1','i1'],'20':['g1','j1']},
'5':{'5':['s','v'],'15':['t','w'],'20':['u','x']},
'15':{'5':['q1','t1'],'15':['r1','u1'],'20':['s1','v1']}
}
};

const root={
name:'RL Agent',
color:'#3b82f6',
children:[]
};

trainingSeason.forEach(season=>{

const seasonNode={
name:season,
color:'#8b5cf6',
children:[]
};

pvSizes.forEach(pv=>{

const pvNode={
name:`${pv}kWp`,
color:'#0ea5e9',
children:[]
};

batteries.forEach(b=>{

const batteryNode={
name:`${b}kWh`,
color:'#10b981',
children:[]
};

const tests=scenarioMap[season][pv][b];

batteryNode.children.push({
name:tests[0],
color:'#06b6d4'
});

batteryNode.children.push({
name:tests[1],
color:'#f59e0b'
});

pvNode.children.push(batteryNode);

});

seasonNode.children.push(pvNode);

});

root.children.push(seasonNode);

});

/* TREE */

let rootNode=d3.hierarchy(root);

const treeLayout=d3.tree().size([width,height-150]);

treeLayout(rootNode);

update(rootNode);

function update(source){

treeLayout(rootNode);

const nodes=rootNode.descendants();
const links=rootNode.links();

/* LINKS */

zoomLayer.selectAll(".link")
.data(links)
.join("path")
.attr("class","link")
.attr("d",d3.linkVertical()
.x(d=>d.x)
.y(d=>d.y)
);

/* NODES */

const node=zoomLayer.selectAll(".node")
.data(nodes)
.join("g")
.attr("class","node")
.attr("transform",d=>`translate(${d.x},${d.y})`);

node.append("circle")
.attr("r",20)
.attr("fill",d=>d.data.color)
.on("click",(event,d)=>{

if(d.children){
d._children=d.children;
d.children=null;
}else{
d.children=d._children;
d._children=null;
}

update(d);

});

node.append("text")
.attr("dy",".35em")
.text(d=>d.data.name);

/* TOOLTIP */

node.on("mousemove",(event,d)=>{

tooltip.style.display="block";
tooltip.innerHTML=`<b>${d.data.name}</b>`;

tooltip.style.left=event.pageX+10+"px";
tooltip.style.top=event.pageY-20+"px";

});

node.on("mouseout",()=>{
tooltip.style.display="none";
});

}

</script>

</body>
</html>
```
